# Rice extras — symlinked to ~/.config/kitty/rice.conf, included from kitty.conf.
# Slight transparency so the Game of Life wallpaper ghosts through terminals.
background_opacity 0.93

# Unified rice font (regular weight only — bold is synthesized; falls back to
# the kitty default until ttf-sharetech-mono-nerd is installed).
font_family ShureTechMono Nerd Font

# Full olive palette (the terminal is an everyday surface and should match the
# rest of the rice). olive.conf is symlinked next to this file by install.sh.
include olive.conf
