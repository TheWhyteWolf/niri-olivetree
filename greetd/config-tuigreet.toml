# greetd — FALLBACK tuigreet greeter config. The active config (config.toml)
# runs lifegreet; install this one instead if the cube greeter ever breaks:
#   sudo install -Dm644 ~/niri-olivetree/greetd/config-tuigreet.toml /etc/greetd/config.toml
#   sudo systemctl restart greetd
# Runs tuigreet on vt1; sessions from /usr/share/wayland-sessions, default
# niri-session, remembered per user.
#
# Theme is the olive rice mapped onto the VT's 16-colour palette (tuigreet
# can't do hex): green = accent, gray = text, darkgray = border.

[terminal]
vt = 1

[default_session]
command = "tuigreet --cmd niri-session --sessions /usr/share/wayland-sessions --remember --remember-user-session --asterisks --time --greeting 'niri — muted olive' --theme 'container=black;border=darkgray;title=green;greet=green;prompt=green;input=gray;text=gray;time=darkgray;action=gray;button=green' --power-shutdown 'systemctl poweroff' --power-reboot 'systemctl reboot'"
user = "greeter"
