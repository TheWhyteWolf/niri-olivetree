# Minimal muted-olive wob — volume (and laptop brightness) OSD.
# Palette: panel #171a14 · border #39412b · accent #a4c94b · urgent #8a3b2e
# Fed by scripts/vol-osd.sh (and macbook's bright-osd.sh) via $XDG_RUNTIME_DIR/wob.sock.

timeout = 900
width = 360
height = 24
anchor = bottom center
margin = 96

# Hard corners, 1px border, flush bar — matches waybar/fuzzel/mako.
border_size = 1
border_offset = 0
bar_padding = 4

background_color = 171a14
border_color = 39412b
bar_color = a4c94b
overflow_bar_color = 8a3b2e
